<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小五數學勇者大冒險</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #ff6b6b;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .unit-badge {
            background-color: #4ecdc4;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .question {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-btn {
            background-color: #f7d794;
            border: 2px solid #f5cd79;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .option-btn:hover {
            background-color: #f5cd79;
            transform: scale(1.05);
        }
        .start-btn, .restart-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        .start-btn:hover, .restart-btn:hover {
            background-color: #ff5252;
        }
        #feedback {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            min-height: 27px;
        }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        
        /* Progress Bar */
        #progress-bar {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            height: 10px;
            display: none;
        }
        #progress {
            width: 0%;
            height: 100%;
            background-color: #4ecdc4;
            border-radius: 10px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>🌟 小五數學勇者大冒險 🌟</h1>
        <p>準備好挑戰 5 個單元的數學大魔王了嗎？<br>仔細閱讀題目，選出正確答案吧！</p>
        <button class="start-btn" onclick="startGame()">開始冒險</button>
    </div>

    <div id="progress-bar"><div id="progress"></div></div>

    <div id="quiz-screen" style="display: none;">
        <div id="unit-badge" class="unit-badge"></div>
        <div id="question" class="question"></div>
        <div class="options-grid" id="options"></div>
        <div id="feedback"></div>
    </div>

    <div id="end-screen" style="display: none;">
        <h1>🎉 恭喜過關！ 🎉</h1>
        <p>你已經成功完成了五個單元的數學測驗，<br>是一位真正的數學勇者！</p>
        <button class="restart-btn" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    const quizData = [
        {
            unit: "第06單元：整數與小數的除法",
            question: "一條長65公尺的繩子，可以綁4捆粽子，平均綁一捆粽子要幾公尺長的繩子？",
            options: ["16公尺", "15.25公尺", "16.25公尺", "16.5公尺"],
            answer: 2
        },
        {
            unit: "第07單元：表面積",
            question: "有一個長和寬都是5公分、高是8公分的長方體紙箱，表面積至少是多少平方公分？<br><small>(提示：上下兩面是正方形，側面是4個長方形)</small>",
            options: ["130 平方公分", "200 平方公分", "210 平方公分", "160 平方公分"],
            answer: 2
        },
        {
            unit: "第08單元：比率與百分率",
            question: "運動用品店裡有一雙球鞋，成本是2000元。老闆「加二成」作為定價，定價是多少元？",
            options: ["2400元", "2200元", "1600元", "2020元"],
            answer: 0
        },
        {
            unit: "第09單元：時間的乘除",
            question: "烤箱每1小時35分鐘可以烤好一盤蛋糕，姐姐烤2盤蛋糕，共花了幾小時幾分鐘？",
            options: ["2小時10分鐘", "3小時10分鐘", "2小時70分鐘", "3小時35分鐘"],
            answer: 1
        },
        {
            unit: "第10單元：生活中的大單位",
            question: "太魯閣國家公園的面積大約是920平方公里，也可以說是幾公頃？",
            options: ["9200 公頃", "92 公頃", "92000 公頃", "920000 公頃"],
            answer: 2
        }
    ];

    let currentQuestionIndex = 0;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('progress-bar').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        document.getElementById('unit-badge').innerText = currentData.unit;
        document.getElementById('question').innerHTML = currentData.question;
        document.getElementById('feedback').innerText = "";
        
        // Update Progress
        const progressPercent = (currentQuestionIndex / quizData.length) * 100;
        document.getElementById('progress').style.width = progressPercent + "%";

        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = "";
        
        currentData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        const currentData = quizData[currentQuestionIndex];
        const feedbackEl = document.getElementById('feedback');
        const allBtns = document.querySelectorAll('.option-btn');

        // Disable all buttons after clicking
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex === currentData.answer) {
            feedbackEl.innerHTML = "✨ 答對了！太厲害了！";
            feedbackEl.className = "correct";
            btnElement.style.backgroundColor = "#2ecc71";
            btnElement.style.color = "white";
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showEndScreen();
                }
            }, 1500);
        } else {
            feedbackEl.innerHTML = "❌ 答錯囉！請再試一次！";
            feedbackEl.className = "wrong";
            btnElement.style.backgroundColor = "#e74c3
